<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>DocuMind – RAG Chatbot</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="/static/styles.css"/>
</head>
<body>
  <!-- ── Sidebar ─────────────────────────────────────────── -->
  <aside class="sidebar">
    <div class="logo">
      <div class="logo-icon">📄</div>
      <span class="logo-text">DocuMind</span>
    </div>

    <!-- Tabs -->
    <div class="ingest-tabs">
      <button class="tab-btn active" id="tabPdf" onclick="switchTab('pdf')">📄 PDF</button>
      <button class="tab-btn"        id="tabUrl" onclick="switchTab('url')">🌐 URL</button>
    </div>

    <!-- PDF Panel -->
    <div id="panelPdf" class="ingest-panel">
      <label class="upload-zone" id="uploadZone">
        <input type="file" id="pdfInput" accept=".pdf" hidden multiple/>
        <div class="upload-icon">⬆️</div>
        <p class="upload-hint">Drop PDF here or <span class="upload-link">browse</span></p>
      </label>
      <div id="uploadStatus" class="upload-status"></div>
    </div>

    <!-- URL Panel -->
    <div id="panelUrl" class="ingest-panel" style="display:none;">
      <input
        type="url"
        id="urlInput"
        class="url-input"
        placeholder="https://example.com"
      />
      <div class="url-options">
        <label class="url-option-label" for="maxPages">Max child pages</label>
        <input type="number" id="maxPages" class="url-pages-input" value="30" min="1" max="100"/>
      </div>
      <button class="crawl-btn" id="crawlBtn" onclick="handleUrlIngest()">🕷️ Crawl &amp; Index</button>
      <div id="urlStatus" class="upload-status"></div>
    </div>

    <!-- Indexed sources list (shared) -->
    <ul id="docList" class="doc-list"></ul>

    <div class="sidebar-footer">
      <p>Made by Anand</p>
    </div>
  </aside>

  <!-- ── Main Chat ───────────────────────────────────────── -->
  <main class="chat-container">
    <header class="chat-header">
      <h1>Ask your documents or websites anything</h1>
      <p class="chat-subtitle">Upload a PDF or crawl a website URL on the left, then start chatting</p>
    </header>

    <section class="messages" id="messages">
      <!-- Welcome message -->
      <div class="message assistant-message">
        <div class="avatar assistant-avatar">🤖</div>
        <div class="bubble">
          Hello! I'm DocuMind. Upload a <strong>PDF</strong> or crawl a <strong>website URL</strong> using the sidebar, then ask me anything about the content.
        </div>
      </div>
    </section>

    <!-- Input bar -->
    <div class="input-bar">
      <textarea
        id="questionInput"
        class="question-input"
        placeholder="Ask a question about your documents…"
        rows="1"
      ></textarea>
      <button class="send-btn" id="sendBtn" title="Send">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" width="20" height="20">
          <path d="M3.478 2.405a.75.75 0 00-.926.94l2.432 7.905H13.5a.75.75 0 010 1.5H4.984l-2.432 7.905a.75.75 0 00.926.94 60.519 60.519 0 0018.445-8.986.75.75 0 000-1.218A60.517 60.517 0 003.478 2.405z"/>
        </svg>
      </button>
    </div>
  </main>

  <script>
    // ── Tab switching ─────────────────────────────────────────
    function switchTab(tab) {
      document.getElementById('panelPdf').style.display = tab === 'pdf' ? '' : 'none';
      document.getElementById('panelUrl').style.display = tab === 'url' ? '' : 'none';
      document.getElementById('tabPdf').classList.toggle('active', tab === 'pdf');
      document.getElementById('tabUrl').classList.toggle('active', tab === 'url');
    }

    // ── PDF Upload ─────────────────────────────────────────────
    const pdfInput   = document.getElementById('pdfInput');
    const uploadZone = document.getElementById('uploadZone');
    const uploadStatus = document.getElementById('uploadStatus');
    const docList    = document.getElementById('docList');

    uploadZone.addEventListener('dragover', e => { e.preventDefault(); uploadZone.classList.add('drag-over'); });
    uploadZone.addEventListener('dragleave', () => uploadZone.classList.remove('drag-over'));
    uploadZone.addEventListener('drop', e => {
      e.preventDefault();
      uploadZone.classList.remove('drag-over');
      handleFiles(e.dataTransfer.files);
    });
    pdfInput.addEventListener('change', () => handleFiles(pdfInput.files));

    async function handleFiles(files) {
      // Clear previous document list
      docList.innerHTML = '';
      
      for (const file of files) {
        if (!file.name.toLowerCase().endsWith('.pdf')) {
          showStatus(uploadStatus, `❌ ${file.name} is not a PDF.`, 'error');
          continue;
        }
        showStatus(uploadStatus, `⏳ Clearing previous data & indexing ${file.name}…`, 'loading');
        const formData = new FormData();
        formData.append('file', file);
        try {
          const res  = await fetch('/upload', { method: 'POST', body: formData });
          const data = await res.json();
          if (res.ok) {
            showStatus(uploadStatus, `✅ ${data.message}`, 'success');
            addDocBadge('📄 ' + file.name);
          } else {
            showStatus(uploadStatus, `❌ ${data.detail || 'Upload failed.'}`, 'error');
          }
        } catch {
          showStatus(uploadStatus, '❌ Network error during upload.', 'error');
        }
      }
    }

    // ── URL Crawl ──────────────────────────────────────────────
    const urlStatus = document.getElementById('urlStatus');
    const crawlBtn  = document.getElementById('crawlBtn');

    async function handleUrlIngest() {
      const url      = document.getElementById('urlInput').value.trim();
      const maxPages = parseInt(document.getElementById('maxPages').value, 10) || 30;

      if (!url) {
        showStatus(urlStatus, '❌ Please enter a URL.', 'error');
        return;
      }
      if (!url.startsWith('http://') && !url.startsWith('https://')) {
        showStatus(urlStatus, '❌ URL must start with http:// or https://', 'error');
        return;
      }

      // Clear previous document list
      docList.innerHTML = '';

      crawlBtn.disabled = true;
      showStatus(urlStatus, `⏳ Clearing previous data & crawling ${url}…`, 'loading');

      try {
        const res  = await fetch('/ingest-url', {
          method:  'POST',
          headers: { 'Content-Type': 'application/json' },
          body:    JSON.stringify({ url, max_child_urls: maxPages }),
        });
        const data = await res.json();
        if (res.ok) {
          showStatus(urlStatus, `✅ ${data.message}`, 'success');
          addDocBadge('🌐 ' + new URL(url).hostname);
        } else {
          showStatus(urlStatus, `❌ ${data.detail || 'Crawl failed.'}`, 'error');
        }
      } catch {
        showStatus(urlStatus, '❌ Network error during crawl.', 'error');
      }

      crawlBtn.disabled = false;
    }

    // Enter key triggers crawl from URL input
    document.getElementById('urlInput').addEventListener('keydown', e => {
      if (e.key === 'Enter') handleUrlIngest();
    });

    // ── Shared helpers ─────────────────────────────────────────
    function showStatus(el, msg, type) {
      el.textContent = msg;
      el.className   = `upload-status ${type}`;
    }

    function addDocBadge(label) {
      const li = document.createElement('li');
      li.className   = 'doc-badge';
      li.textContent = label;
      docList.appendChild(li);
    }

    // ── Chat ──────────────────────────────────────────────────
    const messages      = document.getElementById('messages');
    const questionInput = document.getElementById('questionInput');
    const sendBtn       = document.getElementById('sendBtn');

    // Auto-resize textarea
    questionInput.addEventListener('input', () => {
      questionInput.style.height = 'auto';
      questionInput.style.height = Math.min(questionInput.scrollHeight, 160) + 'px';
    });

    // Send on Enter (Shift+Enter = newline)
    questionInput.addEventListener('keydown', e => {
      if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
    });
    sendBtn.addEventListener('click', sendMessage);

    async function sendMessage() {
      const question = questionInput.value.trim();
      if (!question) return;

      appendMessage('user', question);
      questionInput.value = '';
      questionInput.style.height = 'auto';
      sendBtn.disabled = true;

      const typingId = appendTyping();

      try {
        const res  = await fetch('/chat', {
          method:  'POST',
          headers: { 'Content-Type': 'application/json' },
          body:    JSON.stringify({ question }),
        });
        const data = await res.json();
        removeTyping(typingId);

        if (res.ok) {
          appendAnswer(data.answer, data.sources);
        } else {
          appendMessage('assistant', `❌ ${data.detail || 'Something went wrong.'}`);
        }
      } catch {
        removeTyping(typingId);
        appendMessage('assistant', '❌ Network error. Please try again.');
      }

      sendBtn.disabled = false;
    }

    function appendMessage(role, text) {
      const isUser = role === 'user';
      const div = document.createElement('div');
      div.className = `message ${isUser ? 'user-message' : 'assistant-message'}`;
      div.innerHTML = `
        ${!isUser ? '<div class="avatar assistant-avatar">🤖</div>' : ''}
        <div class="bubble">${escapeHtml(text)}</div>
        ${isUser ? '<div class="avatar user-avatar">👤</div>' : ''}
      `;
      messages.appendChild(div);
      messages.scrollTop = messages.scrollHeight;
    }

    function appendAnswer(answer, sources) {
      const div = document.createElement('div');
      div.className = 'message assistant-message';

      let sourcesHtml = '';
      if (sources && sources.length) {
        sourcesHtml = `
          <div class="sources">
            <h4 class="sources-title">📎 Sources</h4>
            ${sources.map(s => `
              <div class="source-card">
                <span class="source-meta">📄 ${escapeHtml(s.source)} · Page ${s.page}</span>
                <p class="source-excerpt">"${escapeHtml(s.excerpt)}"</p>
              </div>
            `).join('')}
          </div>`;
      }

      div.innerHTML = `
        <div class="avatar assistant-avatar">🤖</div>
        <div class="bubble answer-bubble">
          <p class="answer-text">${escapeHtml(answer)}</p>
          ${sourcesHtml}
        </div>
      `;
      messages.appendChild(div);
      messages.scrollTop = messages.scrollHeight;
    }

    function appendTyping() {
      const id  = 'typing-' + Date.now();
      const div = document.createElement('div');
      div.id        = id;
      div.className = 'message assistant-message';
      div.innerHTML = `
        <div class="avatar assistant-avatar">🤖</div>
        <div class="bubble typing-indicator"><span></span><span></span><span></span></div>
      `;
      messages.appendChild(div);
      messages.scrollTop = messages.scrollHeight;
      return id;
    }

    function removeTyping(id) {
      const el = document.getElementById(id);
      if (el) el.remove();
    }

    function escapeHtml(t) {
      return String(t)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/\n/g, '<br/>');
    }
  </script>
</body>
</html>
